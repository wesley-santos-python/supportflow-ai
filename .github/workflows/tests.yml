name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Instala as dependências reais do app (inclui jinja2, python-multipart
        # etc.) — a lista manual antiga esquecia pacotes e quebrava os testes.
        pip install -r requirements.txt
        # Dependências só de teste.
        pip install pytest httpx
    
    - name: Run tests
      run: |
        pytest tests/ -v --tb=short
