<div class="fixed inset-0 z-40 flex items-center justify-center p-4 bg-black/60"
     onclick="if(event.target===this) this.parentElement.innerHTML=''">
    <div class="bg-surface border border-edge rounded-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto shadow-2xl">
        <!-- Cabeçalho -->
        <div class="flex items-start justify-between gap-4 p-5 border-b border-edge">
            <div>
                <h2 class="text-lg font-semibold text-white">{{ ticket.subject or "(sem assunto)" }}</h2>
                <p class="text-xs text-gray-500 mt-1">De: {{ ticket.sender }}</p>
            </div>
            <button onclick="document.getElementById('modal').innerHTML=''"
                    class="text-gray-400 hover:text-white text-xl leading-none">✕</button>
        </div>

        <div class="p-5 flex flex-col gap-4">
            <!-- Metadados -->
            <div class="flex flex-wrap gap-2 text-xs">
                <span class="px-2 py-1 rounded-full bg-blue-900/40 text-blue-300">Urgência: {{ ticket.urgencia }}</span>
                <span class="px-2 py-1 rounded-full bg-amber-900/40 text-amber-300">📂 {{ ticket.categoria }}</span>
                <span class="px-2 py-1 rounded-full bg-gray-700/60 text-gray-300">{{ ticket.status }}</span>
            </div>

            <!-- Resumo da IA -->
            <div>
                <h3 class="text-sm font-bold text-blue-400 mb-1">Resumo (IA)</h3>
                <p class="text-sm text-gray-300">{{ ticket.resumo or "Análise ainda não concluída" }}</p>
            </div>

            <!-- E-mail original -->
            <details class="bg-base border border-edge rounded-lg">
                <summary class="cursor-pointer px-3 py-2 text-sm text-gray-400">📨 Ver e-mail original</summary>
                <pre class="px-3 pb-3 text-xs text-gray-400 whitespace-pre-wrap font-sans">{{ ticket.body or "(sem corpo)" }}</pre>
            </details>

            <!-- Resposta sugerida (editável) -->
            <div>
                <h3 class="text-sm font-bold text-emerald-400 mb-1">Resposta Sugerida</h3>
                <textarea id="resp-{{ ticket.id }}" rows="6"
                          class="w-full bg-base border border-edge rounded-lg p-3 text-sm text-gray-200 focus:outline-none focus:ring-2 focus:ring-emerald-600">{{ ticket.resposta_sugerida or "Aguardando processamento..." }}</textarea>
            </div>

            <!-- Ações -->
            <div class="flex flex-wrap items-center justify-between gap-3 pt-2">
                <select name="status"
                        hx-post="/tickets/{{ ticket.id }}/status"
                        hx-target="#ticket-{{ ticket.id }}" hx-swap="outerHTML"
                        class="bg-base border border-edge rounded-lg px-3 py-2 text-sm text-gray-300">
                    {% for s in status_options %}
                    <option value="{{ s }}" {% if s == ticket.status %}selected{% endif %}>{{ s }}</option>
                    {% endfor %}
                </select>
                <div class="flex gap-2">
                    <button onclick="copyText('resp-{{ ticket.id }}')"
                            class="px-4 py-2 rounded-lg bg-gray-700 hover:bg-gray-600 text-white text-sm">📋 Copiar</button>
                    <button onclick="document.getElementById('modal').innerHTML=''"
                            class="px-4 py-2 rounded-lg bg-blue-700 hover:bg-blue-600 text-white text-sm">Fechar</button>
                </div>
            </div>
        </div>
    </div>
</div>
