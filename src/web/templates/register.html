<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Criar conta · {{ app_name }}</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/style.css" />
  <script>
    (function () {
      try {
        document.documentElement.setAttribute("data-theme", localStorage.getItem("theme") || "dark");
      } catch (e) { document.documentElement.setAttribute("data-theme", "dark"); }
    })();
  </script>
</head>
<body class="auth-body">
  {% include "_icons.svg" %}
  <button class="icon-btn theme-toggle auth-top" onclick="toggleTheme()" title="Alternar tema">
    <svg class="ico sm icon-sun"><use href="#i-sun"/></svg>
    <svg class="ico sm icon-moon"><use href="#i-moon"/></svg>
  </button>

  <div class="auth-card">
    <div class="auth-brand">
      <svg class="brand-logo" viewBox="0 0 40 40"><use href="#logo-floatech"/></svg>
      <div class="brand-text">
        <span class="brand-name">{{ app_name }}</span>
        <span class="brand-by">by <b>{{ company_name }}</b></span>
      </div>
    </div>
    <h1>Criar conta</h1>
    <p class="muted small">Comece a gerir seus e-mails de suporte com IA</p>

    {% if erro %}<div class="auth-error"><svg class="ico sm"><use href="#i-alert"/></svg> {{ erro }}</div>{% endif %}

    <form method="post" action="/register" class="auth-form">
      <label>Nome
        <input type="text" name="name" required autofocus placeholder="Seu nome ou empresa" />
      </label>
      <label>E-mail
        <input type="email" name="email" required placeholder="voce@empresa.com" />
      </label>
      <label>Senha
        <input type="password" name="password" required minlength="6" placeholder="mínimo 6 caracteres" />
      </label>
      <button class="btn primary full" type="submit">Criar conta</button>
    </form>

    <p class="auth-foot">Já tem conta? <a href="/login">Entrar</a></p>
  </div>
  <script src="/static/js/app.js"></script>
</body>
</html>
