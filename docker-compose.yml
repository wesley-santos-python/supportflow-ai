services:
  db:
    image: postgres:16-alpine
    container_name: supportflow-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: supportflow
      POSTGRES_PASSWORD: supportflow
      POSTGRES_DB: supportflow
    ports:
      - "5432:5432"
    volumes:
      - supportflow_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U supportflow"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  supportflow_pgdata:
